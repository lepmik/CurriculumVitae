ec_track_record_intro: >
  My research bridges neuroscience and AI in both directions: using principles of brain function
  to build better AI systems, and using AI to deepen our understanding of neural computation.
  Since 2020 I have founded and led the BioAI group at Simula Research
  Laboratory, growing it to 11 researchers (1 postdoc, 10 PhD students) and managing a portfolio
  of $\sim$4.5\,MNOK/year. I received the \textbf{NORA Early Career Investigator Award in AI 2025}.
  Four MSc alumni have gone on to PhD programmes at Simula, the University of Oslo, and Stanford.

ec_research_vision: >
  My overarching goal is to understand the computational principles that make biological neural
  systems so efficient at building and using internal world models --- and to translate those
  principles into AI that generalises more robustly, reasons more transparently, and remains
  interpretable under deployment. The brain solves problems that state-of-the-art AI cannot:
  it navigates novel environments from sparse experience, adapts representations on-the-fly,
  and does so in a fault-tolerant, energy-efficient substrate. My research programme treats
  these capabilities not as metaphors but as engineering targets.

ec_pub_narrative_nca: >
  I have developed Neural Cellular Automata (NCAs) inspired by principles of brain function.
  This work includes the discovery of emergent attention and scalability in active sensing NCAs [sensor_nca],
  and developmental solutions for abstract reasoning using ARC-NCA [arc_nca].
  [arc_nca] was featured on the Machine Learning Street Talk (MLST) podcast.

ec_pub_narrative_spatial_nav: >
  A central focus of the BioAI group has been AI models of spatial navigation.
  We showed that toroidal topology---not individual grid cells---drives coherent
  remapping [schoyen2023] (iScience, {schoyen2023.citations} cit.), establishing a topological diagnostic for
  how the brain encodes space.

ec_pub_narrative_causal: >
  Beginning in 2018 in collaboration with Konrad Kording I developed quasi-experimental
  methods for causal inference in neural circuits [lepperoD2022_causal] (PLOS CB, {lepperoD2022_causal.citations} cit.). The method was
  directly adopted by Pospisil et al.\ (2024) to map the fruit-fly brain effectome
  (\textit{Nature}, V\,634, P\,201--209), demonstrating its translational impact.

ec_pub_narrative_neuroscience: >
  During my PhD I combined in-vivo electrophysiology with computational methods.
  Perineuronal nets stabilize the grid cell network [christensen2021] (\textit{Nature Communications},
  {christensen2021.citations} cit.), identifying a structural plasticity mechanism for spatial memory.


