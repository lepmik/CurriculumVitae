summary: >
  Senior Research Scientist and group leader combining deep technical expertise in
  computational neuroscience and AI with proven ability to rapidly master and
  innovate with new technologies. My research explores the fascinating
  bidirectional relationship between neuroscience and artificial intelligence:
  using insights from brain function to advance AI systems while leveraging AI
  to deepen our understanding of neural processes. Since 2020 I have led the
  BioAI research group at Simula Research Laboratory, and I hold an adjunct
  associate professor position at the University of Oslo.
